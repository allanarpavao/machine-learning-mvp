<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA - Sistema de Gestão Acadêmica | Predição</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="topbar">
        <div class="logo">SGA <span>Analytics</span></div>
        <div class="user-profile">Secretaria Acadêmica</div>
    </header>

    <main class="container">
        <section class="card form-section">
            <h2>Análise de Risco do Aluno</h2>
            <p class="subtitle">Insira os dados do aluno para prever a situação acadêmica final.</p>
            
            <form id="predictionForm">
                <div class="form-grid">
                    
                    <!-- ==============================
                         Dados Sociodemográficos
                    =============================== -->
                    <div class="input-group">
                        <label for="marital_status">Estado Civil</label>
                        <input type="number" id="marital_status" name="marital_status" placeholder="Ex: 1 a 6" required>
                    </div>
                    <div class="input-group">
                        <label for="nationality">Nacionalidade</label>
                        <input type="number" id="nationality" name="nationality" placeholder="Ex: 1 (Português)" required>
                    </div>
                    <div class="input-group">
                        <label for="displaced">Transferido</label>
                        <input type="number" id="displaced" name="displaced" placeholder="Ex: 0 (Não) ou 1 (Sim)" required>
                    </div>
                    <div class="input-group">
                        <label for="gender">Gênero</label>
                        <input type="number" id="gender" name="gender" placeholder="Ex: 0 (Fem) ou 1 (Masc)" required>
                    </div>
                    <div class="input-group">
                        <label for="age_at_enrollment">Idade na Matrícula</label>
                        <input type="number" id="age_at_enrollment" name="age_at_enrollment" placeholder="Ex: 19" required>
                    </div>
                    <div class="input-group">
                        <label for="international">Estudante Internacional</label>
                        <input type="number" id="international" name="international" placeholder="Ex: 0 (Não) ou 1 (Sim)" required>
                    </div>

                    <!-- ==============================
                         Dados Socioeconômicos
                    =============================== -->
                    <div class="input-group">
                        <label for="mother_qualification">Qualificação da Mãe</label>
                        <input type="number" id="mother_qualification" name="mother_qualification" placeholder="Ex: 1 a 29" required>
                    </div>
                    <div class="input-group">
                        <label for="father_qualification">Qualificação do Pai</label>
                        <input type="number" id="father_qualification" name="father_qualification" placeholder="Ex: 1 a 34" required>
                    </div>
                    <div class="input-group">
                        <label for="mother_occupation">Ocupação da Mãe</label>
                        <input type="number" id="mother_occupation" name="mother_occupation" placeholder="Ex: 1 a 32" required>
                    </div>
                    <div class="input-group">
                        <label for="father_occupation">Ocupação do Pai</label>
                        <input type="number" id="father_occupation" name="father_occupation" placeholder="Ex: 1 a 46" required>
                    </div>
                    <div class="input-group">
                        <label for="education_special_needs">Necessidades Especiais</label>
                        <input type="number" id="education_special_needs" name="education_special_needs" placeholder="Ex: 0 (Não) ou 1 (Sim)" required>
                    </div>
                    <div class="input-group">
                        <label for="debtor">Inadimplente (Devedor)</label>
                        <input type="number" id="debtor" name="debtor" placeholder="Ex: 0 (Não) ou 1 (Sim)" required>
                    </div>
                    <div class="input-group">
                        <label for="tuition_fees_up_to_date">Mensalidades em Dia</label>
                        <input type="number" id="tuition_fees_up_to_date" name="tuition_fees_up_to_date" placeholder="Ex: 0 (Não) ou 1 (Sim)" required>
                    </div>
                    <div class="input-group">
                        <label for="scholarship_holder">Bolsista</label>
                        <input type="number" id="scholarship_holder" name="scholarship_holder" placeholder="Ex: 0 (Não) ou 1 (Sim)" required>
                    </div>

                    <!-- ==============================
                         Dados de Ingresso (Candidatura)
                    =============================== -->
                    <div class="input-group">
                        <label for="application_mode">Modo de Candidatura</label>
                        <input type="number" id="application_mode" name="application_mode" placeholder="Ex: 1 a 18" required>
                    </div>
                    <div class="input-group">
                        <label for="application_order">Ordem de Preferência</label>
                        <input type="number" id="application_order" name="application_order" placeholder="Ex: 1 a 9" required>
                    </div>
                    <div class="input-group">
                        <label for="course">Curso</label>
                        <input type="number" id="course" name="course" placeholder="Ex: 1 a 17" required>
                    </div>
                    <div class="input-group">
                        <label for="daytime_evening_attendance">Turno</label>
                        <input type="number" id="daytime_evening_attendance" name="daytime_evening_attendance" placeholder="Ex: 0 (Noturno) ou 1 (Diurno)" required>
                    </div>
                    <div class="input-group">
                        <label for="previous_qualification">Qualificação Anterior</label>
                        <input type="number" id="previous_qualification" name="previous_qualification" placeholder="Ex: 1 a 17" required>
                    </div>
                    <div class="input-group">
                        <label for="previous_qualification_grade">Nota Qualificação Anterior</label>
                        <input type="number" step="0.001" id="previous_qualification_grade" name="previous_qualification_grade" placeholder="Ex: 95" required>
                    </div>
                    <div class="input-group">
                        <label for="admission_grade">Nota de Ingresso</label>
                        <input type="number" step="0.001" id="admission_grade" name="admission_grade" placeholder="Ex: 95" required>
                    </div>

                    <!-- ==============================
                         Desempenho Acadêmico - 1º Semestre
                    =============================== -->
                    <div class="input-group">
                        <label for="curricular_units_1st_sem_credited">Disc. Creditadas (1º Sem)</label>
                        <input type="number" id="curricular_units_1st_sem_credited" name="curricular_units_1st_sem_credited" placeholder="Ex: 0" required>
                    </div>
                    <div class="input-group">
                        <label for="curricular_units_1st_sem_enrolled">Disc. Matriculadas (1º Sem)</label>
                        <input type="number" id="curricular_units_1st_sem_enrolled" name="curricular_units_1st_sem_enrolled" placeholder="Ex: 6" required>
                    </div>
                    <div class="input-group">
                        <label for="curricular_units_1st_sem_evaluations">Avaliações Realizadas (1º Sem)</label>
                        <input type="number" id="curricular_units_1st_sem_evaluations" name="curricular_units_1st_sem_evaluations" placeholder="Ex: 8" required>
                    </div>
                    <div class="input-group">
                        <label for="curricular_units_1st_sem_approved">Disc. Aprovadas (1º Sem)</label>
                        <input type="number" id="curricular_units_1st_sem_approved" name="curricular_units_1st_sem_approved" placeholder="Ex: 5" required>
                    </div>
                    <div class="input-group">
                        <label for="curricular_units_1st_sem_grade">Média de Notas (1º Sem)</label>
                        <input type="number" step="0.001" id="curricular_units_1st_sem_grade" name="curricular_units_1st_sem_grade" placeholder="Ex: 14.333" required>
                    </div>
                    <div class="input-group">
                        <label for="curricular_units_1st_sem_without_evaluations">Disc. Sem Avaliação (1º Sem)</label>
                        <input type="number" id="curricular_units_1st_sem_without_evaluations" name="curricular_units_1st_sem_without_evaluations" placeholder="Ex: 0" required>
                    </div>

                    <!-- ==============================
                         Desempenho Acadêmico - 2º Semestre
                    =============================== -->
                    <div class="input-group">
                        <label for="curricular_units_2nd_sem_credited">Disc. Creditadas (2º Sem)</label>
                        <input type="number" id="curricular_units_2nd_sem_credited" name="curricular_units_2nd_sem_credited" placeholder="Ex: 0" required>
                    </div>
                    <div class="input-group">
                        <label for="curricular_units_2nd_sem_enrolled">Disc. Matriculadas (2º Sem)</label>
                        <input type="number" id="curricular_units_2nd_sem_enrolled" name="curricular_units_2nd_sem_enrolled" placeholder="Ex: 6" required>
                    </div>
                    <div class="input-group">
                        <label for="curricular_units_2nd_sem_evaluations">Avaliações Realizadas (2º Sem)</label>
                        <input type="number" id="curricular_units_2nd_sem_evaluations" name="curricular_units_2nd_sem_evaluations" placeholder="Ex: 7" required>
                    </div>
                    <div class="input-group">
                        <label for="curricular_units_2nd_sem_approved">Disc. Aprovadas (2º Sem)</label>
                        <input type="number" id="curricular_units_2nd_sem_approved" name="curricular_units_2nd_sem_approved" placeholder="Ex: 5" required>
                    </div>
                    <div class="input-group">
                        <label for="curricular_units_2nd_sem_grade">Média de Notas (2º Sem)</label>
                        <input type="number" step="0.001" id="curricular_units_2nd_sem_grade" name="curricular_units_2nd_sem_grade" placeholder="Ex: 13.500" required>
                    </div>
                    <div class="input-group">
                        <label for="curricular_units_2nd_sem_without_evaluations">Disc. Sem Avaliação (2º Sem)</label>
                        <input type="number" id="curricular_units_2nd_sem_without_evaluations" name="curricular_units_2nd_sem_without_evaluations" placeholder="Ex: 0" required>
                    </div>

                </div>

                <div class="button-group">
                    <button type="submit" class="btn-primary" id="submitBtn">
                        <span id="btnText">Realizar Predição</span>
                        <span id="btnLoader" class="loader hidden"></span>
                    </button>
                    
                    <button type="button" class="btn-secondary" onclick="preencherDadosTeste()">
                        Preencher Dados Teste
                    </button>
                </div>
            </form>
        </section>

        <!-- Seção de Resultado -->
        <section id="resultSection" class="card result-section hidden">
            <h3>Resultado da Predição</h3>
            <div id="predictionBadge" class="badge"></div>
            <p id="predictionMessage" class="message"></p>
            <button class="btn-secondary" onclick="resetForm()">Nova Consulta</button>
        </section>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
